<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无网络连接</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 容器样式 */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease-in-out;
        }

        /* 图标样式 */
        .icon {
            font-size: 5em;
            color: #ff4d4d;
            margin-bottom: 20px;
            animation: bounce 1.5s infinite;
        }

        /* 标题样式 */
        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* 提示信息样式 */
        p {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 25px;
        }

        /* 按钮样式 */
        .retry-button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .retry-button:hover {
            background-color: #5a6fd1;
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-20px);
            }
            60% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">📶</div>
    <h1>无网络连接</h1>
    <p>请检查您的网络设置，然后重试。</p>
</div>
</body>
</html>
